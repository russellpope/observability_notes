# Alertmanager configuration
#
# Customize receivers and routes for your alert destinations.
# See: https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  # Default receiver — logs to Alertmanager UI only (no external notification)
  - name: "default"

  # Critical alerts — configure with your preferred notification channel
  - name: "critical"
